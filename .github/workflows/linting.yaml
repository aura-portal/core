---
name: Linting
on:
  push:
    branches-ignore:
      - main
permissions:
  contents: read
jobs:
  linting:
    uses: aura-portal/.github/.github/workflows/linting.yaml@main
    permissions:
      contents: read
      packages: read
      statuses: write
      checks: write
    with:
      command: npm install prettier-plugin-svelte --no-save && npm ci --prefix ./app
